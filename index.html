<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="AquaDealers is the complete inventory, billing, and management software for aqua feed and medicine dealers. Simplify stock tracking, farmer dues, and daily accounting." />
    <meta name="keywords" content="aquadealers, aqua, dealer, inventory, aqua feed, aqua medicine, billing software, aquaculture, farmer dues, stock management, aquadealers.in" />
    <meta name="author" content="AquaDealers" />
    <link rel="canonical" href="https://aquadealers.in/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aquadealers.in/" />
    <meta property="og:title" content="AquaDealers | Aqua Feed & Medicine Inventory Management" />
    <meta property="og:description" content="The complete software solution for aqua feed and medicine dealers to track inventory, generate bills, and manage farmer dues." />
    <meta property="og:image" content="https://aquadealers.in/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://aquadealers.in/" />
    <meta property="twitter:title" content="AquaDealers | Aqua Feed & Medicine Inventory Management" />
    <meta property="twitter:description" content="The complete software solution for aqua feed and medicine dealers to track inventory, generate bills, and manage farmer dues." />
    <meta property="twitter:image" content="https://aquadealers.in/logo.png" />

    <meta name="theme-color" content="#1B6CA8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AquaDealers" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AquaDealers" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>AquaDealers | Aqua Feed & Medicine Inventory Management</title>
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AquaDealers",
      "operatingSystem": "Any",
      "applicationCategory": "BusinessApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      },
      "description": "AquaDealers is the complete inventory, billing, and management software for aqua feed and medicine dealers in India.",
      "url": "https://aquadealers.in/"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AquaDealers",
      "url": "https://aquadealers.in/",
      "logo": "https://aquadealers.in/logo.png"
    }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Splash: shown before React mounts, auto-replaced -->
      <style>
        .splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;background:linear-gradient(160deg,#f0f7ff 0%,#e4f0fd 50%,#daeafa 100%);font-family:'Plus Jakarta Sans',sans-serif}
        .splash__orbit-wrap{position:relative;width:7.5rem;height:7.5rem;display:flex;align-items:center;justify-content:center}
        .splash__orbit{position:absolute;inset:0;width:100%;height:100%;animation:sp-spin 1.6s linear infinite}
        .splash__logo{width:3.5rem;height:3.5rem;border-radius:1rem;background:#fff;padding:0.35rem;box-shadow:0 4px 16px rgba(0,82,204,0.12);position:relative;z-index:2}
        .splash__brand{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;color:#0f2d44}
        .splash__msg{font-size:0.82rem;font-weight:600;color:#5d7486;margin:0;margin-top:-0.75rem}
        .splash__bar-wrap{width:9rem;height:0.25rem;border-radius:9999px;background:rgba(0,82,204,0.08);overflow:hidden}
        .splash__bar{width:40%;height:100%;border-radius:9999px;background:linear-gradient(90deg,#3385ff,#0052cc,#3385ff);background-size:200% 100%;animation:sp-shimmer 1.8s ease-in-out infinite}
        @keyframes sp-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @keyframes sp-shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
      </style>
      <div class="splash">
        <div class="splash__orbit-wrap">
          <svg class="splash__orbit" viewBox="0 0 120 120" fill="none">
            <circle cx="60" cy="60" r="54" stroke="rgba(0,82,204,0.08)" stroke-width="3"/>
            <path d="M60 6 A54 54 0 0 1 114 60" stroke="url(#sg)" stroke-width="3.5" stroke-linecap="round"/>
            <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0052cc" stop-opacity="0.9"/><stop offset="100%" stop-color="#3385ff" stop-opacity="0.2"/></linearGradient></defs>
          </svg>
          <img src="/logo.png" alt="AquaDealers" class="splash__logo"/>
        </div>
        <span class="splash__brand">AquaDealers</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
