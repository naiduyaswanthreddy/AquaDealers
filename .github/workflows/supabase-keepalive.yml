name: Supabase Keep Alive

on:
  schedule:
    # Runs at 12:00 AM every 3rd day to keep Supabase from pausing
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -s -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/dealers?select=id&limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
